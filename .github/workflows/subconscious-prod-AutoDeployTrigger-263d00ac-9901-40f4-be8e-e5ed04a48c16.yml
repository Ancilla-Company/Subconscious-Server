name: Trigger auto deployment for subconscious-prod

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/subconscious-prod-AutoDeployTrigger-263d00ac-9901-40f4-be8e-e5ed04a48c16.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo
      packages: write #Required to push to GitHub Container Registry

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/subconscious-prod:${{ github.sha }}

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.SUBCONSCIOUSPROD_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.SUBCONSCIOUSPROD_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.SUBCONSCIOUSPROD_AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: subconscious-prod
          resourceGroup: subconscious-prod
          imageToDeploy: ghcr.io/${{ github.repository_owner }}/subconscious-prod:${{ github.sha }}


