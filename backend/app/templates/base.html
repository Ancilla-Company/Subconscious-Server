<!DOCTYPE html>
<html class="light" lang="en">

<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>{% block title %}Subconscious{% endblock %}</title>
  <link href="https://fonts.googleapis.com" rel="preconnect" />
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
    rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "on-secondary": "#ffffff",
            "on-error": "#ffffff",
            "tertiary": "#000000",
            "on-tertiary": "#ffffff",
            "primary": "#000000",
            "on-primary-fixed": "#1b1b1b",
            "on-tertiary-fixed-variant": "#41484e",
            "on-secondary-container": "#5f6368",
            "on-tertiary-fixed": "#151c22",
            "inverse-surface": "#2f3131",
            "secondary": "#5b5f63",
            "tertiary-fixed-dim": "#c0c7cf",
            "on-background": "#1a1c1c",
            "secondary-container": "#dde0e5",
            "on-primary-container": "#848484",
            "tertiary-container": "#151c22",
            "surface-bright": "#f9f9f9",
            "inverse-primary": "#c6c6c6",
            "surface-container-highest": "#e2e2e2",
            "error-container": "#ffdad6",
            "primary-fixed-dim": "#c6c6c6",
            "on-surface": "#1a1c1c",
            "primary-fixed": "#e2e2e2",
            "tertiary-fixed": "#dce3ec",
            "on-primary": "#ffffff",
            "outline": "#7e7576",
            "inverse-on-surface": "#f0f1f1",
            "primary-container": "#1b1b1b",
            "secondary-fixed": "#e0e3e8",
            "on-secondary-fixed-variant": "#43474c",
            "background": "#f9f9f9",
            "on-primary-fixed-variant": "#474747",
            "surface": "#f9f9f9",
            "on-error-container": "#93000a",
            "on-tertiary-container": "#7e858c",
            "surface-variant": "#e2e2e2",
            "outline-variant": "#cfc4c5",
            "secondary-fixed-dim": "#c3c7cc",
            "surface-container-low": "#f3f3f4",
            "surface-container-lowest": "#ffffff",
            "surface-dim": "#dadada",
            "on-surface-variant": "#4c4546",
            "surface-container-high": "#e8e8e8",
            "surface-container": "#eeeeee",
            "surface-tint": "#5e5e5e",
            "error": "#ba1a1a",
            "on-secondary-fixed": "#181c20"
          },
          fontFamily: {
            "headline": ["Inter", "sans-serif"],
            "body": ["Inter", "sans-serif"],
            "label": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"
          },
        },
      },
    }
  </script>
  <style>
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
    }

    .neural-bg {
      background-image: radial-gradient(circle at 2px 2px, rgba(255, 255, 255, 0.15) 1px, transparent 0);
      background-size: 40px 40px;
    }

    .neural-lines {
      background:
        linear-gradient(45deg, transparent 49%, rgba(255, 255, 255, 0.05) 50%, transparent 51%) 0 0/100px 100px,
        linear-gradient(-45deg, transparent 49%, rgba(255, 255, 255, 0.05) 50%, transparent 51%) 0 0/100px 100px;
    }

    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(20px);
    }
  </style>
  {% block head_extra %}{% endblock %}
</head>

<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary">

  <!-- TopNavBar -->
  <nav class="fixed top-0 w-full z-50 bg-white/70 dark:bg-black/70 backdrop-blur-xl">
    <div class="flex justify-between items-center w-full px-8 py-6 max-w-[1440px] mx-auto">
      <a href="/" class="text-xl font-bold lowercase tracking-tighter text-black dark:text-white">subconscious</a>
      <div class="hidden md:flex items-center gap-8 font-['Inter'] font-medium text-[0.875rem] tracking-tight">
        <a href="/features"
          class="transition-colors {% if active_page == 'features' %}text-black dark:text-white font-bold border-b border-black dark:border-white pb-1{% else %}text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white{% endif %}">Features
          & Roadmap</a>
        <a href="/blog"
          class="transition-colors {% if active_page == 'blog' %}text-black dark:text-white font-bold border-b border-black dark:border-white pb-1{% else %}text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white{% endif %}">Blog</a>
        <a href="/api/docs"
          class="text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white transition-colors">API
          Docs</a>
        <a href="https://github.com/subconscious"
          class="text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white transition-colors">GitHub</a>
      </div>
      <button
        class="bg-primary text-on-primary px-6 py-2 rounded-lg font-medium text-sm hover:opacity-80 transition-opacity active:scale-[0.98]">
        Download
      </button>
    </div>
  </nav>

  {% block content %}{% endblock %}

  <!-- Footer -->
  <footer class="w-full pt-24 pb-12 bg-neutral-50 dark:bg-neutral-950 px-8">
    <div class="max-w-[1440px] mx-auto">
      <div
        class="flex flex-col md:flex-row justify-between items-start md:items-center gap-12 w-full pt-12 border-t border-neutral-200 dark:border-neutral-800">
        <div class="flex gap-8 font-['Inter'] body-md tracking-normal">
          <a class="text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white transition-colors"
            href="#">Info</a>
          <a class="text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white transition-colors underline decoration-1"
            href="#">License</a>
          <a class="text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white transition-colors"
            href="https://github.com/Ancilla-Company/Subconscious/issues">Report Issue</a>
          <a class="text-neutral-500 dark:text-neutral-400 hover:text-black dark:hover:text-white transition-colors"
            href="https://github.com/Ancilla-Company/Subconscious">GitHub</a>
        </div>
        <div class="text-neutral-500 dark:text-neutral-400 text-sm font-medium">
          © 2026 subconscious. technical monolith.
        </div>
      </div>
      <div
        class="text-[8rem] md:text-[12rem] font-bold lowercase tracking-tighter leading-none text-center w-full text-black dark:text-white mt-12">
        subconscious
      </div>
    </div>
  </footer>

</body>

</html>
